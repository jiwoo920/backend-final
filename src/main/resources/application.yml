spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meme_library}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://dev-n6lgjqpsv3qu74s0.us.auth0.com/}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  mvc:
    hiddenmethod:
      filter:
        enabled: true

auth0:
  audience: ${AUTH0_AUDIENCE:https://meme-backend-api}

app:
  cors:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

server:
  port: ${PORT:8080}
